name: Déployer sur GitHub Pages

# Déploie l'app à chaque push sur la branche principale.
# Pré-requis (une seule fois) : dépôt GitHub → Settings → Pages → Source = « GitHub Actions ».

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Le build a besoin de Python (étape prebuild : build_books_index.py).
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
