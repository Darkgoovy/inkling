name = "inkling-push"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron : déclenche l'envoi des rappels toutes les 5 minutes (cf. spec §10.7.4).
[triggers]
crons = ["*/5 * * * *"]

# Stockage des abonnements. Remplace l'id par celui créé via :
#   wrangler kv namespace create SUBS
[[kv_namespaces]]
binding = "SUBS"
id = "22b3c034badd49f1a19357a8328575a9"

[vars]
# VAPID_SUBJECT (mailto de contact) est défini en SECRET pour ne pas exposer
# l'email dans ce dépôt public :  wrangler secret put VAPID_SUBJECT
ALLOW_ORIGIN = "https://darkgoovy.github.io"
# Clé VAPID PUBLIQUE (publique, sans risque). La clé PRIVÉE se met en secret :
#   wrangler secret put VAPID_PRIVATE_KEY
VAPID_PUBLIC_KEY = "BIe6JO7eNeSetk_zoIU6LQGqfd45hwtyHFW3OJlxhQoPtndA2Si1ayPsd38lYXJ3ZXClka8dCcH0yKbBewsMoLs"
